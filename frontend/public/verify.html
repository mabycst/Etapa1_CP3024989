<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Código - Sistema de Autenticação</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-color: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --border-focus: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Brilho de fundo */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(11,15,25,0) 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, rgba(11,15,25,0) 70%);
            bottom: -150px;
            right: -150px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 20px 45px rgba(79, 70, 229, 0.15);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #f3f4f6 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .email-display {
            font-weight: 600;
            color: #818cf8;
            margin-top: 5px;
            display: inline-block;
            word-break: break-all;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: rgba(17, 24, 39, 0.8);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background-color: #111827;
        }

        /* Estilização para o campo de email desabilitado mas legível */
        .form-group input.readonly {
            background-color: rgba(31, 41, 55, 0.5);
            border-color: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .code-input {
            text-align: center;
            font-size: 1.5rem !important;
            letter-spacing: 0.3em;
            font-weight: 700;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #818cf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>Verificação de Segurança</h1>
            <p>Enviamos um código de 6 dígitos para o e-mail abaixo:</p>
            <span id="email-label" class="email-display">carregando...</span>
        </div>

        <form action="/verify-code" method="POST">
            <!-- Input oculto para submeter o email real -->
            <input type="hidden" id="email-hidden" name="email">

            <div class="form-group">
                <label for="email-readonly">E-mail</label>
                <input type="email" id="email-readonly" class="readonly" readonly>
            </div>

            <div class="form-group">
                <label for="code">Código de Acesso</label>
                <input type="text" id="code" name="code" class="code-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autocomplete="one-time-code">
            </div>

            <button type="submit" class="btn-submit">Confirmar Acesso</button>
        </form>

        <a href="/" class="back-link">Solicitar novo e-mail</a>

        <div class="footer">
            Sistema de Autenticação Seguro &copy; 2026
        </div>
    </div>
</div>

<script>
    // Recupera o email passado via query string (?email=...)
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');

    if (emailParam) {
        const emailDecoded = decodeURIComponent(emailParam);
        document.getElementById('email-label').innerText = emailDecoded;
        document.getElementById('email-hidden').value = emailDecoded;
        document.getElementById('email-readonly').value = emailDecoded;
    } else {
        document.getElementById('email-label').innerText = "nenhum e-mail informado";
    }
</script>

</body>
</html>
