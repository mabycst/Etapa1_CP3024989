<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-color: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #374151;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Efeito de brilho */
        body::before {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(11,15,25,0) 70%);
            top: -150px;
            left: -150px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background-color: rgba(16, 185, 129, 0.15);
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            color: var(--accent-color);
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #f3f4f6 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin: 0 0 30px 0;
            line-height: 1.6;
        }

        .token-container {
            text-align: left;
            margin-bottom: 30px;
        }

        .token-container h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .token-box {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #34d399;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .btn-logout {
            padding: 12px 30px;
            background-color: #ef4444;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            background-color: #dc2626;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.45);
        }

        .btn-logout:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="success-icon">✓</div>
        
        <h1>Acesso Autorizado!</h1>
        <p>Você foi autenticado com sucesso no sistema. O seu Token JWT foi armazenado na sessão do navegador (sessionStorage).</p>

        <div class="token-container">
            <h2>Token JWT Recuperado:</h2>
            <div id="token-display" class="token-box">Nenhum token encontrado na sessão.</div>
        </div>

        <button onclick="logout()" class="btn-logout">Sair do Painel</button>
    </div>
</div>

<script>
    // Recupera o token do sessionStorage
    const token = sessionStorage.getItem('token');
    if (token) {
        document.getElementById('token-display').innerText = token;
    }

    // Função para limpar o token e voltar à página de login
    function logout() {
        sessionStorage.removeItem('token');
        window.location.href = '/';
    }
</script>

</body>
</html>
